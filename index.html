<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/moviemachi_logo.png" />
    <link rel="shortcut icon" type="image/png" href="/moviemachi_logo.png" />
    <link rel="apple-touch-icon" href="/moviemachi_logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#e50914" />
    <title>MovieMachi - Tamil Movies, Series & Entertainment Portal</title>

<meta name="description" content="MovieMachi offers Tamil movies, series, trailers, movie requests and entertainment updates in one place." />

<meta name="keywords" content="MovieMachi,Tamil Movies,Tamil Series,Movie Requests,Tamil Cinema,Entertainment" />

<meta name="author" content="MovieMachi" />

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('MovieMachi Service Worker registered:', reg.scope))
            .catch(err => console.error('MovieMachi Service Worker registration failed:', err));
        });
      }
    </script>
  </body>
